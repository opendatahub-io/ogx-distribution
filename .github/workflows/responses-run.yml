name: "Responses: run tests"

on:
  workflow_call:
    inputs:
      provider_name:
        description: 'Provider identifier (used in artifact/report names)'
        required: true
        type: string
      models_json:
        description: 'JSON array of model IDs for the test matrix'
        required: true
        type: string
      embedding_model:
        description: 'Embedding model ID to use for tests'
        required: true
        type: string
      image_name:
        description: 'Container image name'
        required: false
        type: string
        default: 'quay.io/opendatahub/odh-ogx-core'
      image_tag:
        description: 'Container image tag'
        required: false
        type: string
        default: 'source-b5c18de28794baaf537b2683271a5043ccd42426-6515a120edf38a477a55b037e745752f2535661c'
      gcp_auth:
        description: 'Enable GCP Workload Identity auth and mount credentials'
        required: false
        type: boolean
        default: false
    secrets:
      SERVER_EXTRA_ENV:
        description: 'Newline-separated KEY=VALUE pairs for the server container'
        required: true
      GCP_PROJECT:
        description: 'GCP project ID (required when gcp_auth is true)'
        required: false
      GCP_WORKLOAD_IDENTITY_PROVIDER:
        description: 'GCP Workload Identity provider (required when gcp_auth is true)'
        required: false

jobs:
  test:
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      contents: read
      checks: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: 3.12
          enable-cache: false

      - name: Authenticate to Google Cloud
        if: inputs.gcp_auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          project_id: ${{ secrets.GCP_PROJECT }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}

      - name: Prepare GCP volume mounts
        if: inputs.gcp_auth
        id: gcp
        run: |
          echo "volumes=$GOOGLE_APPLICATION_CREDENTIALS:/run/secrets/gcp-credentials:ro" >> "$GITHUB_OUTPUT"

      - name: Setup PostgreSQL
        uses: ./.github/actions/setup-postgres

      - name: Setup server
        uses: ./.github/actions/setup-server
        with:
          image_name: ${{ inputs.image_name }}
          image_tag: ${{ inputs.image_tag }}
          extra_env: ${{ secrets.SERVER_EXTRA_ENV }}
          volumes: ${{ steps.gcp.outputs.volumes }}

      - name: Clone upstream tests
        shell: bash
        run: |
          git clone --branch v1.0.0 --depth 1 https://github.com/ogx-ai/ogx.git /tmp/ogx-tests
          cd /tmp/ogx-tests

          uv venv --clear
          source .venv/bin/activate
          uv pip install -e . ogx-client ollama pytest langchain-openai langgraph

      - name: Run responses tests
        shell: bash
        env:
          PROVIDER_NAME: ${{ inputs.provider_name }}
          EMBEDDING_MODEL: ${{ inputs.embedding_model }}
          MODELS_JSON: ${{ inputs.models_json }}
        run: |
          cd /tmp/ogx-tests
          source .venv/bin/activate
          mkdir -p /tmp/test-results

          # Tests to skip: connector_resolution requires a pre-registered
          # connector in config.yaml (upstream ci-tests/config.yaml has it,
          # our distro config does not).
          SKIP_TESTS="test_response_connector_resolution_mcp_tool"

          readarray -t MODELS < <(echo "$MODELS_JSON" | python3 -c 'import json,sys; [print(m) for m in json.load(sys.stdin)]')

          overall_rc=0
          for model in "${MODELS[@]}"; do
            short="${model##*/}"
            echo "::group::Testing model $model"
            set +e
            python -m pytest -s -v tests/integration/responses/ \
              -k "not ($SKIP_TESTS)" \
              --stack-config=server:"$GITHUB_WORKSPACE/distribution/config.yaml" \
              --text-model="$model" \
              --embedding-model="$EMBEDDING_MODEL" \
              --inference-mode=live \
              --junit-xml="/tmp/test-results/results_${PROVIDER_NAME}_${short}.xml"
            rc=$?
            set -e
            echo "::endgroup::"
            if [ $rc -ne 0 ] && [ $rc -ne 5 ]; then
              overall_rc=$rc
            fi
          done
          exit $overall_rc

      - name: Publish test report
        if: always()
        uses: dorny/test-reporter@df6247429542221bc30d46a036ee47af1102c451 # v2
        with:
          name: "${{ inputs.provider_name }}"
          path: /tmp/test-results/*.xml
          reporter: java-junit
          fail-on-error: 'false'

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: responses-${{ inputs.provider_name }}
          path: /tmp/test-results/
          retention-days: 90

      - name: Cleanup
        if: always()
        run: |
          for c in ogx postgres; do
            docker rm -f "$c" 2>/dev/null || true
          done
